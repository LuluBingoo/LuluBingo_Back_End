name: Deploy Backend to cPanel

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Touch Passenger restart flag
        run: |
          # cPanel Passenger picks up restart when this file changes.
          mkdir -p tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ" > tmp/restart.txt

      - name: Deploy files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          # For accounts rooted at public_html, deploy backend under a subfolder.
          server-dir: ./lulubingo_backend/
          exclude: |
            **/.git*/**
            **/.github/**
            **/env/**
            **/.venv/**
            **/__pycache__/**
            **/*.pyc
            **/*.pyo
            **/node_modules/**
            **/.env
            **/db.sqlite3
            **/*.log
            **/manage_check_*.txt
            **/render.yaml
            **/schema.yaml
            **/*tests.py
            **/tests.py
            **/CPANEL_CICD_SETUP.md
            **/README.md
            **/OFFLINE_CARTELLA_CATALOG.md
            **/OFFLINE_CARTELLA_CATALOG.json
          dangerous-clean-slate: false

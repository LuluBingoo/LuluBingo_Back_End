  /api/games/game/{game_id}/cartella/{cartella_number}:
    get:
      operationId: api_games_game_cartella_retrieve
      description: Legacy compatibility endpoint for looking up a single cartella
        by game ID and cartella number.
      summary: Public single-cartella lookup
      parameters:
      - in: path
        name: cartella_number
        schema:
          type: integer
        required: true
      - in: path
        name: game_id
        schema:
          type: string
        required: true
      tags:
      - Games
      security:
      - tokenAuth: []
      - {}

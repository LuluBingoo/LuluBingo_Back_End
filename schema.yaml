        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicCartellaResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '429':
          description: Rate limited
    post:
      operationId: api_games_game_cartella_create

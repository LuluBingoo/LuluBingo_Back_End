    TwoFactorDisable:
      type: object
      properties:
        method:
          $ref: '#/components/schemas/MethodEnum'
        otp:
          type: string
          writeOnly: true
      required:
      - otp
    TwoFactorEmailCode:
      type: object
      properties:
        purpose:
          $ref: '#/components/schemas/PurposeEnum'
      required:
      - purpose
    TwoFactorEnable:
      type: object
      properties:
        method:
          $ref: '#/components/schemas/MethodEnum'
        otp:
          type: string
          writeOnly: true
      required:
      - method
      - otp
    TwoFactorMethodEnum:
      enum:
      - totp
      - email_code
      type: string
      description: |-
        * `totp` - Authenticator app
        * `email_code` - Email code
    TwoFactorSetup:
      type: object
      properties:
        secret:
          type: string
          readOnly: true
        provisioning_uri:
          type: string
          readOnly: true
      required:
      - provisioning_uri
      - secret
    TxTypeEnum:
      enum:
      - deposit
      - withdrawal
      - bet_debit
      - bet_credit
      - adjustment
      type: string
      description: |-
        * `deposit` - Deposit
        * `withdrawal` - Withdrawal
        * `bet_debit` - Bet debit
        * `bet_credit` - Bet credit
        * `adjustment` - Adjustment
    WinHistoryItem:
      type: object
      properties:
        game_id:

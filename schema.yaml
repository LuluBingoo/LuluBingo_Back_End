openapi: 3.0.3
info:
  title: Dallol Bingo API
  version: 0.1.0
  description: Authentication & shop identity endpoints for Dallol Bingo. Shops are
    provisioned by HQ admins only; no self-signup is allowed. Each shop receives temporary
    credentials, must change the password on first login, and can be activated, suspended,
    or blocked centrally. Tokens issued here secure all subsequent Bingo operations.
paths:
  /api/auth/2fa/disable:
    post:
      operationId: api_auth_2fa_disable_create
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorDisable'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorDisable'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorDisable'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopUser'
          description: ''
  /api/auth/2fa/email-code:

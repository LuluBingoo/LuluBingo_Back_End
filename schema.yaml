          format: date-time
      required:
      - date
      - game_id
      - payout_amount
      - winner_indexes
      - winning_pattern
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
